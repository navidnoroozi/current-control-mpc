<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MPC Inverter Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { margin-bottom: 20px; }
        input { margin: 5px; padding: 5px; }
        button { padding: 8px 12px; }
    </style>
</head>
<body>
    <h1>MPC Controlled Inverter Simulator</h1>

    <form method="POST">
        <label>Control Horizon:</label>
        <input type="number" name="control_horizon" required><br>

        <label>Sampling Time (s):</label>
        <input type="text" name="sampling_time" required><br>

        <label>Simulation Time (s):</label>
        <input type="text" name="sim_time" required><br>

        <button type="submit">Run Simulation</button>
    </form>

    {% if plot_filename %}
        <h2>Simulation Result</h2>
        <img src="{{ url_for('static', filename='plots/' + plot_filename) }}"
            alt="Simulation Plot" width="600">
    {% endif %}

</body>
</html>
